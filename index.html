<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

.reviews-box{
 position:fixed;
 bottom:20px;
 left:20px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.review-card{
 display:flex;
 gap:10px;
 background:#2a2a2a;
 padding:10px;
 border-radius:12px;
 width:220px;
 align-items:center;
 animation:slideIn .5s;
 opacity:1;
}

.review-card img{
 width:40px;
 height:40px;
 border-radius:50%;
}

@keyframes slideIn{
 from{opacity:0;transform:translateX(-20px)}
 to{opacity:1;transform:translateX(0)}
}

.fadeOut{
 animation:fadeOut .5s forwards;
}

@keyframes fadeOut{
 to{opacity:0;transform:translateX(-30px)}
}


 .tiktok-btn{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#2a2a2a;
 padding:10px;
 border-radius:12px;
 transition:.3s;
}

.tiktok-btn img{
 width:30px;
}

.tiktok-btn:hover{
 transform:scale(1.1);
}

 

 @keyframes bounceCart{
 0%{transform:scale(1)}
 50%{transform:scale(1.25)}
 100%{transform:scale(1)}
}

 
body{
 margin:0;
 font-family:'Cairo',sans-serif;
 color:#e5e7eb;
 text-align:center;
 background:url("https://cdn.discordapp.com/attachments/1481554508797575282/1484414502123343902/NYC0320_21.png?ex=69beccfc&is=69bd7b7c&hm=e6abe566b888e7defa8014e5af9670d026ab78b8b8a262fdd271a403b02907b5&") center/cover no-repeat fixed;
}

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.7);
 z-index:-1;
}

h1{margin-top:30px;color:#3b82f6}

 .review-container,
.tiktok{
 z-index:1;
}

#popup{
 z-index:99999;
}

 
.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:#2a2a2a;
 padding:12px;
 border-radius:50%;
 cursor:pointer
}

.cart span{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:2px 6px;
 border-radius:50%
}

.categories{
 display:flex;
 gap:15px;
 justify-content:center;
 margin-top:20px
}

.cat{
 background:#2a2a2a;
 padding:12px 20px;
 border-radius:10px;
 cursor:pointer;
 transition:.3s
}

.cat:hover{
 background:#3b82f6;
 transform:scale(1.08)
}

.products{
 display:none;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 max-width:900px;
 margin:40px auto
}

.card{
 background:#2a2a2a;
 border-radius:12px;
 overflow:hidden
}

.card img{
 width:100%;
 aspect-ratio:1220/686;
 object-fit:cover
}

.card-content{
 padding:10px
}

.price{
 color:#60a5fa
}

.btn{
 background:linear-gradient(135deg,#3b82f6,#2563eb);
 color:#fff;
 border:none;
 padding:10px 22px;
 border-radius:14px;
 cursor:pointer;
 margin-top:10px;
 font-weight:700;
 transition:.3s
}

.btn:hover{
 transform:scale(1.08)
}

.details{
 display:none;
 margin-top:40px
}

.box{
 background:#2a2a2a;
 padding:20px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
 text-align:right
}

.box img{
 width:100%;
 border-radius:10px;
 margin-bottom:10px
}

.cart-page{
 display:none;
 margin-top:40px
}

.item{
 background:#2a2a2a;
 margin:10px auto;
 padding:10px;
 border-radius:10px;
 max-width:320px;
 display:flex;
 justify-content:space-between
}

.total{
 color:#3b82f6;
 margin-top:10px
}

.buy-btn{
 background:#22c55e;
 padding:12px 24px;
 border-radius:14px;
 color:#fff;
 border:none;
 margin-top:12px;
 cursor:pointer
}

.review-container{
 position:fixed;
 bottom:20px;
 left:20px
}

.review{
 background:#2a2a2a;
 padding:10px;
 border-radius:12px;
 width:200px
}

.stars{
 color:gold
}

.tiktok{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#2a2a2a;
 padding:10px;
 border-radius:10px
}
 #popup button{
 width:100%;
 margin:10px 0;
}

@keyframes pop{
 0%{transform:scale(0);opacity:0}
 100%{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="reviews-box" id="reviewsBox"></div>


 <div class="tiktok-btn">
<a href="https://www.tiktok.com/@nyc.store1" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
</div>


<h1>NYC Store</h1>

<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>

<div class="categories">
<div class="cat" onclick="show()">اشتراكات</div>
</div>

<div class="products" id="subs">

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414710886568057/NYC0320_18.png?ex=69becd2e&is=69bd7bae&hm=0dc82450c2a74282193f414412d039b07b97d9f693942b25325e7cdf1426eabc&">
<div class="card-content">
Netflix
<div class="price">14 ريال</div>
<button class="btn" onclick="openDetails('netflix',14)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414605236371517/NYC0320_9.png?ex=69becd14&is=69bd7b94&hm=168d40475c110b2b73eba123917093a1dc3a1a67d16479520d4025359625c4d7&">
<div class="card-content">
OSN
<div class="price">15 ريال</div>
<button class="btn" onclick="openDetails('osn',15)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414688161693736/NYC0320_17.png?ex=69becd28&is=69bd7ba8&hm=667d2c4c2a283f4805741eceffc8202a2cc38f9ac4a1d5d6782813e7a4b7b6ae&">
<div class="card-content">
Prime
<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('prime',12)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414652019380344/NYC0320_10.png?ex=69becd20&is=69bd7ba0&hm=b1ec22b243d4b6e5acf3826c48f1da44203122a8b29ffb388029740aa75cceb4&">
<div class="card-content">
Shahid
<div class="price">24 ريال</div>
<button class="btn" onclick="openDetails('shahid',24)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414749549793401/NYC0320_4.png?ex=69becd37&is=69bd7bb7&hm=16cee09ddb121bdc927e4d77a1c64e45420f01ec496cca325ca1ebde0c817233&">
<div class="card-content">
YouTube
<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('youtube',12)">التفاصيل</button>
</div>
</div>

</div>

<div class="details" id="details">
<div class="box">
<img id="img">
<h3 id="name"></h3>
<p id="desc"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
<button class="btn" onclick="back()">رجوع</button>
</div>
</div>

<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="buy-btn" onclick="goBuy()">شراء</button>
<button class="btn" onclick="backHome()">رجوع</button>
</div>

<div id="successBar" style="position:fixed;top:-80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);border:2px solid #22c55e;color:#22c55e;padding:12px 25px;border-radius:12px;z-index:2000;transition:.4s;">
تمت الإضافة إلى السلة
</div>

<div id="popup" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
">

  <div style="
  background:#2a2a2a;
  padding:20px;
  border-radius:15px;
  width:280px;
  text-align:center;
  animation:pop .3s;
  position:relative;
  z-index:10000;
  ">

    <h3>اختر نوع الحساب</h3>
    <div id="popupOptions"></div>
    <button class="btn" onclick="closePopup()">إلغاء</button>

  </div>
</div>

<audio id="successSound" preload="auto">
<source src="https://cdn.discordapp.com/attachments/1279907327046062161/1484722055369986169/sound-4.mp3?ex=69bf42aa&is=69bdf12a&hm=8791d187b88a7bcdd5579eb6867cee8b1a3e78e456658c3b1446fac2b327083f&" type="audio/mpeg">
</audio>
 
<script>
let cart=[];
let current={};

 const reviews = [
 {name:"البرشلوني",text:"خدمة سريعة جدًا 🔥"},
 {name:"احمد السليم",text:"أفضل متجر تعاملت معه"},
 {name:"سالم الشريف",text:"وصلني الحساب خلال دقيقة"},
 {name:"عبدلله احمد",text:"أسعارهم خيالية"},
 {name:"خالد الشمري",text:"أنصح فيه بقوة"},
 {name:"ناصر العصيمي",text:"ثقة واحتراف"},
 {name:"عبدالرحمن العجمي",text:"رجعت أطلب مرة ثانية"},
 {name:"تركي ال مصره",text:"سريعين مرة 🔥"},
 {name:"سعود الشلاحي",text:"أفضل دعم"},
 {name:"يوسف الكندري",text:"ممتاز جدًا"},
 {name:"راشد مبارك القبندي",text:"ما قصروا"},
 {name:"حمد العازمي",text:"خدمة رهيبة"},
 {name:"علي تركي الزرقاوي",text:"اشتغل تمام"},
 {name:"شريف الخالدي",text:"أفضل تجربة"},
 {name:"مبارك الدوسري",text:"سريع وموثوق"},
 {name:"غيث المطيري",text:"كل شي تمام"},
 {name:"حسين عباس",text:"أنصح بيه"},
 {name:"ماجد الهاجري",text:"متجر قوي"},
 {name:"عبدالعزيز الجبلي",text:"10/10 🔥"},
 {name:"ديور",text:"فخم والله"}
];

let currentIndex = 0;

function createReview(review){
 return `
 <div class="review-card">
   <img src="https://i.pravatar.cc/40?u=${Math.random()}">
   <div>
     <strong>${review.name}</strong>
     <div class="stars">★★★★★</div>
     <p>${review.text}</p>
   </div>
 </div>
 `;
}

function updateReviews(){
 let box = document.getElementById('reviewsBox');

 // نحذف القديم بانميشن
 let cards = box.querySelectorAll('.review-card');
 cards.forEach(c => c.classList.add('fadeOut'));

 setTimeout(()=>{
   box.innerHTML = "";

   // نحط 2 تقييم فوق بعض
   for(let i=0;i<2;i++){
     let review = reviews[(currentIndex+i)%reviews.length];
     box.innerHTML += createReview(review);
   }

   currentIndex = (currentIndex + 2) % reviews.length;

 },400);
}

// أول تشغيل
updateReviews();

// يتغير كل 3 ثواني
setInterval(updateReviews,3000);

const detailsImages={
 netflix:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414736077422772/NYC0320_19.png?ex=69becd34&is=69bd7bb4&hm=adacab10307204d22496d1b535a0d46aa5b06d6c021d661e4a272e25248ab6a2&",
 osn:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414637956005968/NYC0320_2.png?ex=69becd1c&is=69bd7b9c&hm=5cea6effcc0838ac97affafc59ec64beef74b72c38cdaae0ca148858e75a918e&",
 prime:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414700686151831/NYC0320_8.png?ex=69becd2b&is=69bd7bab&hm=39a431920c3ab86c40446b3b93a1098d4228e898d23227596d95218ed8f34bea&",
 shahid:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414669648167062/NYC0320_1.png?ex=69becd24&is=69bd7ba4&hm=3345ffe37442d990210a3828d5c6db8d23f39686fa0ecf08de70b10ff14986d1&",
 youtube:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414759510999172/NYC0320_6.png?ex=69becd39&is=69bd7bb9&hm=0e2a441c0aba37ed1963f5a719c63c4448ac050b2dd94010623361bdaa96a7c0&"
};

const detailsData={
 netflix:"حساب شهر 14 ريال\nملف شخصي 6 ريال",
 osn:"حساب شهري 15 ريال\nملف شخصي 6 ريال",
 prime:"حساب شهر 12 ريال\nملف شخصي 6 ريال",
 shahid:"حساب شهر 24 ريال\nملف شخصي 12 ريال",
 youtube:"دعوة شهر 12 ريال"
};

function show(){
 document.getElementById('subs').style.display='grid';
}

function openDetails(name,price){
 document.getElementById('subs').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=name;
 document.getElementById('desc').innerText=detailsData[name];
 document.getElementById('img').src=detailsImages[name];
 current={name,price};
}

function addToCart(){

 // يوتيوب بدون خيارات
if(current.name === 'youtube'){
 cart.push({name:'YouTube',type:'شهر',price:12});
 document.getElementById('count').innerText=cart.length;

 showSuccessBar();

 setTimeout(()=>{
   openCart();
 },500);

 return;
}

 let html='';

 if(current.name === 'netflix'){
   html=`
   <button class="btn" onclick="chooseType('حساب شهر',14)">حساب شهر - 14 ريال</button>
   <button class="btn" onclick="chooseType('ملف شخصي',6)">ملف شخصي - 6 ريال</button>`;
 }

 if(current.name === 'osn'){
   html=`
   <button class="btn" onclick="chooseType('حساب شهر',15)">حساب شهر - 15 ريال</button>
   <button class="btn" onclick="chooseType('ملف شخصي',6)">ملف شخصي - 6 ريال</button>`;
 }

 if(current.name === 'prime'){
   html=`
   <button class="btn" onclick="chooseType('حساب شهر',12)">حساب شهر - 12 ريال</button>
   <button class="btn" onclick="chooseType('ملف شخصي',6)">ملف شخصي - 6 ريال</button>`;
 }

 if(current.name === 'shahid'){
   html=`
   <button class="btn" onclick="chooseType('حساب شهر',24)">حساب شهر - 24 ريال</button>
   <button class="btn" onclick="chooseType('ملف شخصي',12)">ملف شخصي - 12 ريال</button>`;
 }

 document.getElementById('popupOptions').innerHTML=html;
let popup = document.getElementById('popup');
popup.style.display='flex';
popup.style.pointerEvents='auto';
}

function showSuccessBar(){
 let bar=document.getElementById('successBar');

 // صوت
document.getElementById('successSound').play().catch(()=>{});
 
 // اهتزاز
 if(navigator.vibrate){
   navigator.vibrate(100);
 }

 // glow للسلة
let cartBtn=document.querySelector('.cart');

// Glow
cartBtn.style.boxShadow='0 0 20px #22c55e';

// Bounce
cartBtn.style.animation='bounceCart 0.4s';

setTimeout(()=>{
 cartBtn.style.animation='';
 cartBtn.style.boxShadow='none';
},500);

 // انيميشن
 bar.style.top='20px';
 bar.style.opacity='1';
 bar.style.transform='translateX(-50%) scale(1.1)';

 setTimeout(()=>{
   bar.style.transform='translateX(-50%) scale(1)';
 },200);

 setTimeout(()=>{
   bar.style.top='-80px';
   bar.style.opacity='0';
 },1200);
}

 function closePopup(){
 document.getElementById('popup').style.display='none';
}

function chooseType(type,price){
 cart.push({
   name:current.name,
   type:type,
   price:price
 });

 document.getElementById('count').innerText=cart.length;

 closePopup();
 showSuccessBar();

 setTimeout(()=>{
   openCart();
 },500);
}
 
function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('cart').style.display='block';

 let html='';let total=0;
 cart.forEach((item,i)=>{
 total+=item.price;
 html+=`<div class="item">${item.name} (${item.type}) - ${item.price} ريال</div>`;
 });

 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' ريال';
}

function back(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='grid';
}

function backHome(){
 document.getElementById('cart').style.display='none';
 document.getElementById('subs').style.display='grid';
}

function goBuy(){
 window.open('https://youtu.be/EUtyJM4vvcY?si=JYE7fTc7nyqfyTvR','_blank');
}

  window.onclick = function(e){
 let popup = document.getElementById('popup');
 if(e.target === popup){
   popup.style.display = 'none';
 }
}
</script>


</body>
</html>
