<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #050505;
  color: white;
}

.navbar {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
}

.hero span {
  background: linear-gradient(90deg, #6a5cff, #00c6ff);
  -webkit-background-clip: text;
  color: transparent;
}

.btn {
  padding: 15px 30px;
  background: linear-gradient(90deg,#6a5cff,#00c6ff);
  border: none;
  border-radius: 10px;
  margin-top: 20px;
  cursor: pointer;
}

.section {
  padding: 100px 40px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.reviews {
  display: flex;
  gap: 20px;
  animation: scroll 20s linear infinite;
}

.review {
  min-width: 200px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 10px;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>

<body>

<div class="navbar">
  <h2>NYC STORE</h2>
  <div>Products | Contact</div>
</div>

<div class="hero">
  <div>
    <h1>اشتراكات رقمية <br><span>بمستوى فاخر</span></h1>
    <p>جودة عالية - تسليم فوري</p>
    <button class="btn">تصفح المنتجات</button>
  </div>
</div>

<div class="section">
  <h2>الباقات</h2>
  <div class="products">
    <div class="card">
      <h3>Netflix</h3>
      <p>4K + جميع الدول</p>
      <button class="btn">إضافة للسلة</button>
    </div>

    <div class="card">
      <h3>Prime Video</h3>
      <p>أفلام ومسلسلات</p>
      <button class="btn">إضافة للسلة</button>
    </div>

    <div class="card">
      <h3>Shahid</h3>
      <p>محتوى عربي</p>
      <button class="btn">إضافة للسلة</button>
    </div>

    <div class="card">
      <h3>OSN</h3>
      <p>أحدث العروض</p>
      <button class="btn">إضافة للسلة</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>آراء العملاء</h2>
  <div class="reviews">
    <div class="review">ما قصروا ⭐⭐⭐⭐⭐</div>
    <div class="review">تسليم سريع ⭐⭐⭐⭐⭐</div>
    <div class="review">خدمة ممتازة ⭐⭐⭐⭐⭐</div>
    <div class="review">تعامل راقي ⭐⭐⭐⭐⭐</div>
    <div class="review">أفضل متجر ⭐⭐⭐⭐⭐</div>
  </div>
</div>

</body>
</html>
