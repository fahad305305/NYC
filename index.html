<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body{
 margin:0;
 font-family:'Cairo',sans-serif;
 color:#e5e7eb;
 text-align:center;
 background:url("https://cdn.discordapp.com/attachments/1481554508797575282/1484414502123343902/NYC0320_21.png?ex=69beccfc&is=69bd7b7c&hm=e6abe566b888e7defa8014e5af9670d026ab78b8b8a262fdd271a403b02907b5&") center/cover no-repeat fixed;
}

/* overlay */
body::before{
 content:"";
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.7);
 z-index:-1;
}

h1{margin-top:30px;color:#3b82f6}

/* LOGO */
.logo{
 position:fixed;
 top:20px;
 left:20px;
}
.logo img{
 width:60px;
 border-radius:10px;
}

/* CART */
.cart{position:fixed;top:20px;right:20px;background:#2a2a2a;padding:12px;border-radius:50%;cursor:pointer}
.cart span{position:absolute;top:-5px;right:-5px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

.categories{display:flex;gap:15px;justify-content:center;margin-top:20px}
.cat{background:#2a2a2a;padding:12px 20px;border-radius:10px;cursor:pointer;transition:.3s}
.cat:hover{background:#3b82f6;transform:scale(1.08)}

.products{display:none;grid-template-columns:repeat(2,1fr);gap:15px;max-width:900px;margin:40px auto}

.card{background:#2a2a2a;border-radius:12px;overflow:hidden}

/* NEW IMAGE SIZE */
.card img{
 width:100%;
 aspect-ratio:1220/686;
 object-fit:cover;
}

.card-content{padding:10px}
.price{color:#60a5fa}

.btn{
 background:linear-gradient(135deg,#3b82f6,#2563eb);
 color:#fff;
 border:none;
 padding:10px 22px;
 border-radius:14px;
 cursor:pointer;
 margin-top:10px;
 font-weight:700;
 letter-spacing:.6px;
 transition:.3s;
 box-shadow:0 0 12px rgba(59,130,246,.4);
 animation:fadeUp .4s ease;
}

.btn:hover{
 transform:scale(1.08);
 box-shadow:0 0 25px rgba(59,130,246,.8);
}

.details{display:none;margin-top:40px}
.box{background:#2a2a2a;padding:20px;border-radius:15px;max-width:400px;margin:auto;text-align:right}
.box img{width:100%;border-radius:10px;margin-bottom:10px}

.cart-page{display:none;margin-top:40px}
.item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:320px;display:flex;justify-content:space-between}
.total{color:#3b82f6;margin-top:10px}

.buy-btn{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 padding:12px 26px;
 border-radius:16px;
 color:#fff;
 border:none;
 margin-top:12px;
 font-weight:800;
 letter-spacing:.7px;
 cursor:pointer;
 transition:.3s;
 box-shadow:0 0 15px rgba(34,197,94,.5);
 animation:pulse 1.5s infinite;
}

.buy-btn:hover{
 transform:scale(1.1);
 box-shadow:0 0 30px rgba(34,197,94,1);
}

.review-container{position:fixed;bottom:20px;left:20px}
.review{background:#2a2a2a;padding:10px;border-radius:12px;width:200px}
.stars{color:gold}

.tiktok{position:fixed;bottom:20px;right:20px;background:#2a2a2a;padding:10px;border-radius:10px}

@keyframes fadeUp{
 from{opacity:0;transform:translateY(15px)}
 to{opacity:1;transform:translateY(0)}
}

@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.05)}
 100%{transform:scale(1)}
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414489800740915/NYC0320_14.png?ex=69beccf9&is=69bd7b79&hm=61a822787670c7a0d34dd23d2a788d89e6e45fb4a7ff752a9543f1ea63c4ef16&">
</div>

<h1>NYC Store</h1>

<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>

<div class="categories">
<div class="cat" onclick="show('subs')">اشتراك حساب</div>
<div class="cat" onclick="show('profiles')">اشتراك ملف</div>
</div>

<div class="products" id="subs">
<div class="card"><img src="PUT-IMAGE"><div class="card-content">Netflix<div class="price">14 ريال</div><button class="btn" onclick="openDetails('netflix',14,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
<div class="card"><img src="PUT-IMAGE"><div class="card-content">OSN<div class="price">15 ريال</div><button class="btn" onclick="openDetails('osn',15,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
<div class="card"><img src="PUT-IMAGE"><div class="card-content">Prime<div class="price">12 ريال</div><button class="btn" onclick="openDetails('prime',12,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
<div class="card"><img src="PUT-IMAGE"><div class="card-content">Shahid<div class="price">24 ريال</div><button class="btn" onclick="openDetails('shahid',24,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
<div class="card"><img src="PUT-IMAGE"><div class="card-content">YouTube<div class="price">12 ريال</div><button class="btn" onclick="openDetails('youtube',12,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
</div>

<div class="products" id="profiles">
<div class="card"><img src="PUT-IMAGE"><div class="card-content">Netflix Profile<div class="price">6 ريال</div><button class="btn" onclick="openDetails('netflix',6,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
</div>

<!-- باقي الكود بدون تغيير -->

</body>
</html>
