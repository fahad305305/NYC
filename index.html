<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#1f1f1f;color:#e5e7eb;text-align:center}

h1{margin-top:30px}

.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:#2a2a2a;
 padding:10px;
 border-radius:50%;
 cursor:pointer;
}
.cart span{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:2px 6px;
 border-radius:50%;
}

.categories{display:flex;gap:15px;justify-content:center;margin-top:20px}
.cat{background:#2a2a2a;padding:12px 20px;border-radius:10px;cursor:pointer;transition:.3s}
.cat:hover{transform:scale(1.1)}

.products{display:none;grid-template-columns:repeat(2,1fr);gap:15px;max-width:600px;margin:40px auto}
.card{background:#2a2a2a;border-radius:12px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:10px}
.price{color:#60a5fa}

.btn{background:#3b82f6;color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;margin-top:8px}

.details{display:none;margin-top:40px;animation:fade .3s}
.box{background:#2a2a2a;padding:20px;border-radius:15px;max-width:350px;margin:auto;text-align:right}
.box img{width:100%;border-radius:10px;margin-bottom:10px}

.cart-page{display:none;margin-top:40px}
.item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}
.total{color:#60a5fa;margin-top:10px}

.review{position:fixed;bottom:20px;left:20px;background:#2a2a2a;padding:10px;border-radius:10px;width:180px}
.review img{width:35px;height:35px;border-radius:50%}
.stars{color:gold}

.tiktok{position:fixed;bottom:20px;right:20px;background:#2a2a2a;padding:10px;border-radius:10px}
.tiktok img{width:30px}

@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<h1>NYC</h1>

<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>

<div class="categories">
<div class="cat" onclick="show('subs')">اشتراك حساب</div>
<div class="cat" onclick="show('profiles')">اشتراك ملف</div>
</div>

<div class="products" id="subs">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"><div class="card-content">Netflix<div class="price">14 ريال</div><button class="btn" onclick="openDetails('Netflix',14,this.src)">التفاصيل</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png"><div class="card-content">OSN<div class="price">15 ريال</div><button class="btn" onclick="openDetails('OSN',15,this.src)">التفاصيل</button></div></div>
</div>

<div class="products" id="profiles">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"><div class="card-content">Netflix Profile<div class="price">6 ريال</div><button class="btn" onclick="openDetails('Netflix Profile',6,this.src)">التفاصيل</button></div></div>
</div>

<div class="details" id="details">
<div class="box">
<img id="img">
<h3 id="name"></h3>
<p id="price"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
<button class="btn" onclick="back()">رجوع</button>
</div>
</div>

<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="btn">شراء</button>
<button class="btn" onclick="backHome()">رجوع</button>
</div>

<div class="review">
<img src="https://i.pravatar.cc/40">
<div>محمد</div>
<div class="stars">★★★★★</div>
<p>ما قصروا</p>
</div>

<div class="tiktok">
<a href="https://www.tiktok.com/@f.0aha" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
</div>

<script>
let cart=[];
let current={};

function show(id){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='none';
 document.getElementById('cart').style.display='none';
 document.getElementById(id).style.display='grid';
}

function openDetails(name,price,img){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=name;
 document.getElementById('price').innerText=price+' ريال';
 document.getElementById('img').src=img;
 current={name,price};
}

function addToCart(){
 cart.push(current);
 document.getElementById('count').innerText=cart.length;
}

function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('cart').style.display='block';

 let html='';let total=0;
 cart.forEach((item,i)=>{
 total+=item.price;
 html+=`<div class="item">${item.name} - ${item.price} ريال <button onclick="removeItem(${i})">❌</button></div>`;
 });
 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' ريال';
}

function removeItem(i){
 cart.splice(i,1);
 document.getElementById('count').innerText=cart.length;
 openCart();
}

function back(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='grid';
}

function backHome(){
 document.getElementById('cart').style.display='none';
 document.getElementById('subs').style.display='grid';
}
</script>

</body>
</html>
