<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#1f1f1f;color:#60a5fa}

.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;position:fixed;width:100%;background:rgba(20,20,20,0.9);backdrop-filter:blur(10px);z-index:1000}
.logo{font-weight:700;font-size:20px}

.cart{position:relative;cursor:pointer;font-size:20px}
.cart span{position:absolute;top:-8px;right:-10px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:55px}
.hero span{color:#3b82f6}

.categories{display:flex;gap:20px;margin-top:20px}
.cat{background:#2a2a2a;padding:20px 35px;border-radius:12px;cursor:pointer;transition:.3s}
.cat:hover{transform:scale(1.08);background:#3a3a3a}

.products{display:none;grid-template-columns:repeat(2,1fr);gap:20px;max-width:600px;margin:100px auto}

.card{background:#2a2a2a;border-radius:12px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-6px) scale(1.03)}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:10px;text-align:center}
.price{color:#fff;font-size:14px;margin-top:5px}

.btn{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:8px}

.product-details{display:none;text-align:center;margin-top:100px}
.product-box{background:#2a2a2a;padding:20px;border-radius:15px;max-width:300px;margin:auto}

.cart-page{display:none;margin-top:100px;text-align:center}
.cart-item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}

.review-container{position:fixed;bottom:20px;left:20px;width:220px;overflow:hidden}
.review-track{display:flex;gap:10px;animation:slide 10s linear infinite}
.review{min-width:220px;background:#2a2a2a;padding:10px;border-radius:12px;text-align:center}
@keyframes slide{0%{transform:translateX(0)}100%{transform:translateX(-230px)}}

.tiktok{position:fixed;bottom:20px;right:20px;background:#2a2a2a;padding:10px;border-radius:12px}
.tiktok img{width:35px}
</style>
</head>
<body>

<div class="nav">
<div class="logo">NYC</div>
<div class="cart" onclick="openCart()">🛒<span id="cartCount">0</span></div>
</div>

<div class="hero" id="home">
<h1>اشتراكات رقمية <br><span>بمستوى فاخر</span></h1>
<p>أفضل جودة - تسليم سريع</p>
<div class="categories">
<div class="cat" onclick="showSection('subs')">الحسابات</div>
<div class="cat" onclick="showSection('profiles')">الملفات</div>
</div>
</div>

<div class="products" id="subs">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="card-content">
Netflix
<div class="price">3 KD</div>
<button class="btn" onclick="openDetails('Netflix','اشتراك كامل 4K','3')">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png">
<div class="card-content">
OSN
<div class="price">3 KD</div>
<button class="btn" onclick="openDetails('OSN','اشتراك كامل','3')">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<div class="card-content">
Prime
<div class="price">2 KD</div>
<button class="btn" onclick="openDetails('Prime','اشتراك','2')">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Shahid_logo.svg">
<div class="card-content">
Shahid
<div class="price">2.5 KD</div>
<button class="btn" onclick="openDetails('Shahid','اشتراك','2.5')">التفاصيل</button>
</div>
</div>
</div>

<div class="products" id="profiles">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<div class="card-content">Prime Profile<div class="price">1 KD</div>
<button class="btn" onclick="openDetails('Prime Profile','ملف واحد','1')">التفاصيل</button></div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png">
<div class="card-content">OSN Profile<div class="price">1 KD</div>
<button class="btn" onclick="openDetails('OSN Profile','ملف واحد','1')">التفاصيل</button></div>
</div>
</div>

<div class="product-details" id="details">
<div class="product-box">
<h2 id="pname"></h2>
<p id="pdesc"></p>
<p id="pprice"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
</div>
</div>

<div class="cart-page" id="cartPage">
<h2>السلة</h2>
<div id="cartItems"></div>
<button class="btn">شراء</button>
</div>

<div class="review-container">
<div class="review-track">
<div class="review">ما قصروا ⭐⭐⭐⭐⭐</div>
<div class="review">سريع ⭐⭐⭐⭐⭐</div>
<div class="review">ممتاز ⭐⭐⭐⭐⭐</div>
</div>
</div>

<div class="tiktok">
<a href="https://www.tiktok.com/@f.0aha" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
</div>

<script>
let cart=[];
let currentProduct={};

function showSection(id){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='none';
 document.getElementById('cartPage').style.display='none';
 document.getElementById(id).style.display='grid';
}

function openDetails(name,desc,price){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('pname').innerText=name;
 document.getElementById('pdesc').innerText=desc;
 document.getElementById('pprice').innerText=price+' KD';
 currentProduct={name,price};
}

function addToCart(){
 cart.push(currentProduct);
 document.getElementById('cartCount').innerText=cart.length;
}

function openCart(){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='none';
 document.getElementById('cartPage').style.display='block';
 let list='';
 cart.forEach((i,index)=>{
  list+=`<div class="cart-item">${i.name} - ${i.price} KD <button onclick="removeItem(${index})">❌</button></div>`;
 });
 document.getElementById('cartItems').innerHTML=list;
}

function removeItem(i){
 cart.splice(i,1);
 document.getElementById('cartCount').innerText=cart.length;
 openCart();
}
</script>

</body>
</html>
