<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#1f1f1f;color:#60a5fa}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;position:fixed;width:100%;background:#111;z-index:1000}
.logo{font-weight:700}

/* CART ICON */
.cart-icon{position:fixed;top:20px;right:20px;background:#2a2a2a;padding:12px;border-radius:50%;cursor:pointer}
.cart-icon span{position:absolute;top:-5px;right:-5px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}

.categories{display:flex;gap:20px;margin-top:20px}
.cat{background:#2a2a2a;padding:20px 35px;border-radius:12px;cursor:pointer}

/* PRODUCTS */
.products{display:none;grid-template-columns:repeat(2,1fr);gap:20px;max-width:600px;margin:120px auto}
.card{background:#2a2a2a;border-radius:12px;overflow:hidden}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{text-align:center;padding:10px}
.btn{background:#3b82f6;color:#fff;border:none;padding:8px;border-radius:8px;cursor:pointer;width:100%}

/* DETAILS PAGE */
.details-page{display:none;text-align:center;margin-top:120px}
.details-box{background:#2a2a2a;padding:20px;border-radius:15px;max-width:300px;margin:auto}

/* CART PAGE */
.cart-page{display:none;margin-top:120px;text-align:center}
.cart-item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}
.total{margin-top:10px}

</style>
</head>
<body>

<div class="nav"><div class="logo">NYC</div></div>

<div class="cart-icon" onclick="openCart()">🛒<span id="count">0</span></div>

<!-- HOME -->
<div class="hero" id="home">
<h1>اشتراكات رقمية</h1>
<div class="categories">
<div class="cat" onclick="show('subs')">الحسابات</div>
<div class="cat" onclick="show('profiles')">الملفات</div>
</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="subs">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="card-content">
Netflix
<button class="btn" onclick="openDetails('Netflix','اشتراك كامل','3')">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png">
<div class="card-content">OSN<button class="btn" onclick="openDetails('OSN','اشتراك كامل','3')">التفاصيل</button></div>
</div>
</div>

<div class="products" id="profiles">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<div class="card-content">Prime Profile<button class="btn" onclick="openDetails('Prime Profile','ملف واحد','1')">التفاصيل</button></div>
</div>
</div>

<!-- DETAILS -->
<div class="details-page" id="details">
<div class="details-box">
<h2 id="name"></h2>
<p id="desc"></p>
<p id="price"></p>
<button class="btn" onclick="add()">إضافة للسلة</button>
</div>
</div>

<!-- CART -->
<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="btn">شراء</button>
</div>

<script>
let cart=[];
let current={};

function show(id){
 document.getElementById('home').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById(id).style.display='grid';
}

function openDetails(n,d,p){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=n;
 document.getElementById('desc').innerText=d;
 document.getElementById('price').innerText=p+' KD';
 current={name:n,price:parseFloat(p)};
}

function add(){
 cart.push(current);
 document.getElementById('count').innerText=cart.length;
}

function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('cart').style.display='block';
 let html='';
 let total=0;
 cart.forEach((i,index)=>{
 total+=i.price;
 html+=`<div class="cart-item">${i.name} - ${i.price} KD <button onclick="remove(${index})">❌</button></div>`;
 });
 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' KD';
}

function remove(i){
 cart.splice(i,1);
 document.getElementById('count').innerText=cart.length;
 openCart();
}
</script>

</body>
</html>
