<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#0f172a;color:#e5e7eb;text-align:center}

h1{margin-top:30px;color:#3b82f6}

/* CART */
.cart{position:fixed;top:20px;right:20px;background:#1e293b;padding:12px;border-radius:50%;cursor:pointer;transition:.3s}
.cart:hover{transform:scale(1.1)}
.cart span{position:absolute;top:-5px;right:-5px;background:#3b82f6;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

/* INTRO TEXT */
.intro{max-width:700px;margin:15px auto;color:#93c5fd;line-height:1.8}

/* CATEGORIES */
.categories{display:flex;gap:15px;justify-content:center;margin-top:20px}
.cat{background:#1e293b;padding:12px 20px;border-radius:10px;cursor:pointer;transition:.3s}
.cat:hover{transform:scale(1.08);background:#3b82f6}

/* PRODUCTS */
.products{display:none;grid-template-columns:repeat(2,1fr);gap:15px;max-width:650px;margin:40px auto}
.card{background:#1e293b;border-radius:12px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:150px;object-fit:cover}
.card-content{padding:10px}
.price{color:#60a5fa}

.btn{background:#3b82f6;color:#fff;border:none;padding:8px 18px;border-radius:10px;cursor:pointer;margin-top:8px}

/* DETAILS */
.details{display:none;margin-top:40px}
.box{background:#1e293b;padding:20px;border-radius:15px;max-width:400px;margin:auto;text-align:right}
.box img{width:100%;border-radius:10px;margin-bottom:10px}

/* CART */
.cart-page{display:none;margin-top:40px}
.item{background:#1e293b;margin:10px auto;padding:10px;border-radius:10px;max-width:320px;display:flex;justify-content:space-between}
.total{color:#3b82f6;margin-top:10px}
.buy-btn{background:#22c55e;padding:10px 20px;border-radius:12px;color:#fff;border:none;margin-top:10px}

/* REVIEW + TIKTOK */
.review-container,.tiktok{position:fixed}
.review-container{bottom:20px;left:20px}
.tiktok{bottom:20px;right:20px;background:#1e293b;padding:10px;border-radius:10px}
.review{background:#1e293b;padding:10px;border-radius:12px;width:200px}
.stars{color:gold}
</style>
</head>
<body>

<h1>NYC Store</h1>

<p class="intro">
مرحباً بك في NYC Store، نقدم لك أفضل الاشتراكات الرقمية بأسعار تنافسية وجودة عالية. نحرص دائماً على رضا عملائنا وتقديم خدمة سريعة وآمنة. شكراً لثقتكم بنا ❤️
</p>

<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>

<div class="categories">
<div class="cat" onclick="show('subs')">اشتراك حساب</div>
<div class="cat" onclick="show('profiles')">اشتراك ملف</div>
</div>

<div class="products" id="subs">
<div class="card"><img src="https://picsum.photos/400/200?1"><div class="card-content">Netflix<div class="price">14 ريال</div><button class="btn" onclick="openDetails('Netflix',14,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
</div>

<div class="products" id="profiles">
<div class="card"><img src="https://picsum.photos/400/200?2"><div class="card-content">Netflix Profile<div class="price">6 ريال</div><button class="btn" onclick="openDetails('Netflix Profile',6,this.parentElement.parentElement.querySelector('img').src)">التفاصيل</button></div></div>
</div>

<div class="details" id="details">
<div class="box">
<img id="img">
<h3 id="name"></h3>
<p id="price"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
<button class="btn" onclick="back()">رجوع</button>
</div>
</div>

<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="buy-btn">شراء</button>
<button class="btn" onclick="backHome()">رجوع</button>
</div>

<div class="review-container" id="reviewBox">
<div class="review">
<div>محمد</div>
<div class="stars">★★★★★</div>
<p>ما قصروا</p>
</div>
</div>

<div class="tiktok" id="tiktokBox">
<a href="https://www.tiktok.com/@f.0aha" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" width="30">
</a>
</div>

<script>
let cart=[];let current={};

function hideExtras(){
 document.getElementById('reviewBox').style.display='none';
 document.getElementById('tiktokBox').style.display='none';
}

function show(id){
 hideExtras();
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='none';
 document.getElementById('cart').style.display='none';
 document.getElementById(id).style.display='grid';
}

function openDetails(name,price,img){
 hideExtras();
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=name;
 document.getElementById('price').innerText=price+' ريال';
 document.getElementById('img').src=img;
 current={name,price};
}

function addToCart(){
 cart.push(current);
 document.getElementById('count').innerText=cart.length;
}

function openCart(){
 hideExtras();
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('cart').style.display='block';
 let html='';let total=0;
 cart.forEach((item,i)=>{
 total+=item.price;
 html+=`<div class="item">${item.name} - ${item.price} ريال <button onclick="removeItem(${i})">❌</button></div>`;
 });
 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' ريال';
}

function removeItem(i){
 cart.splice(i,1);
 document.getElementById('count').innerText=cart.length;
 openCart();
}

function back(){location.reload();}
function backHome(){location.reload();}
</script>

</body>
</html>
