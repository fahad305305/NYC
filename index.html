<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#1f1f1f;color:#60a5fa}

.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;position:fixed;width:100%;background:#111}
.logo{font-weight:700}
.cart{position:relative;cursor:pointer}
.cart span{position:absolute;top:-8px;right:-10px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:50px}

.categories{display:flex;gap:20px;margin-top:20px}
.cat{background:#2a2a2a;padding:15px 25px;border-radius:10px;cursor:pointer}

.products{display:none;grid-template-columns:repeat(2,1fr);gap:20px;max-width:600px;margin:120px auto}
.card{background:#2a2a2a;border-radius:12px;overflow:hidden}
.card img{width:100%;height:140px;object-fit:cover}
.card-content{text-align:center;padding:10px}
.price{color:#fff}
.btn{background:#3b82f6;color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:8px}

.cart-page{display:none;margin-top:120px;text-align:center}
.cart-item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}
.total{color:#60a5fa;font-weight:bold}

.review-box{position:fixed;bottom:20px;left:20px;background:#2a2a2a;padding:10px;border-radius:10px;width:200px}
.review-box img{width:40px;height:40px;border-radius:50%}
.stars{color:gold}

.tiktok{position:fixed;bottom:20px;right:20px;background:#2a2a2a;padding:10px;border-radius:10px}
.tiktok img{width:30px}
</style>
</head>
<body>

<div class="nav">
<div class="logo">NYC Store</div>
<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>
</div>

<div class="hero" id="home">
<h1>اشتراكات رقمية</h1>
<div class="categories">
<div class="cat" onclick="showSection('subs')">اشتراك حساب</div>
<div class="cat" onclick="showSection('profiles')">اشتراك ملف شخصي</div>
</div>
</div>

<!-- حسابات -->
<div class="products" id="subs">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"><div class="card-content">Netflix<div class="price">14 ريال</div><button class="btn" onclick="addToCart('Netflix',14)">إضافة</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png"><div class="card-content">OSN<div class="price">15 ريال</div><button class="btn" onclick="addToCart('OSN',15)">إضافة</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png"><div class="card-content">Prime<div class="price">12 ريال</div><button class="btn" onclick="addToCart('Prime',12)">إضافة</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Shahid_logo.svg"><div class="card-content">Shahid<div class="price">24 ريال</div><button class="btn" onclick="addToCart('Shahid',24)">إضافة</button></div></div>
</div>

<!-- ملفات -->
<div class="products" id="profiles">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"><div class="card-content">Netflix Profile<div class="price">6 ريال</div><button class="btn" onclick="addToCart('Netflix Profile',6)">إضافة</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png"><div class="card-content">OSN Profile<div class="price">6 ريال</div><button class="btn" onclick="addToCart('OSN Profile',6)">إضافة</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png"><div class="card-content">Prime Profile<div class="price">6 ريال</div><button class="btn" onclick="addToCart('Prime Profile',6)">إضافة</button></div></div>
</div>

<!-- سلة -->
<div class="cart-page" id="cartPage">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="btn">شراء</button>
</div>

<!-- تقييم -->
<div class="review-box">
<img src="https://i.pravatar.cc/40">
<div>محمد</div>
<div class="stars">★★★★★</div>
<p>ما قصروا</p>
</div>

<!-- تيك توك -->
<div class="tiktok">
<a href="https://www.tiktok.com/@f.0aha" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
</a>
</div>

<script>
let cart=[];

function showSection(id){
 document.getElementById('home').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('cartPage').style.display='none';
 document.getElementById(id).style.display='grid';
}

function addToCart(name,price){
 cart.push({name,price});
 document.getElementById('count').innerText=cart.length;
}

function openCart(){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('home').style.display='none';
 document.getElementById('cartPage').style.display='block';

 let html='';let total=0;
 cart.forEach((item,i)=>{
  total+=item.price;
  html+=`<div class="cart-item">${item.name} - ${item.price} ريال <button onclick="removeItem(${i})">❌</button></div>`;
 });

 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' ريال';
}

function removeItem(i){
 cart.splice(i,1);
 document.getElementById('count').innerText=cart.length;
 openCart();
}
</script>

</body>
</html>
