<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:#1f1f1f;color:#e5e7eb}

.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;position:fixed;top:0;width:100%;background:#111;z-index:1000}
.logo{font-weight:700;font-size:20px}

.cart{position:relative;cursor:pointer}
.cart span{position:absolute;top:-8px;right:-10px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding-top:60px}
.hero h1{font-size:50px}

.categories{display:flex;gap:20px;margin-top:20px}
.cat{background:#2a2a2a;padding:20px 30px;border-radius:12px;cursor:pointer}

.products{display:none;grid-template-columns:repeat(2,1fr);gap:20px;max-width:700px;margin:120px auto}
.card{background:#2a2a2a;border-radius:12px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.card-content{text-align:center;padding:10px}
.price{color:#60a5fa}
.btn{background:#3b82f6;color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;margin-top:8px}

.product-details{display:none;margin-top:120px;text-align:center}
.product-box{background:#2a2a2a;padding:20px;border-radius:15px;max-width:400px;margin:auto;text-align:right}
.product-box h3{color:#60a5fa}

.cart-page{display:none;margin-top:120px;text-align:center}
.cart-item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}

.review-container{position:fixed;bottom:20px;left:20px}
.review{background:#2a2a2a;padding:10px;border-radius:12px;width:200px}
.review img{width:40px;height:40px;border-radius:50%}
.review .name{font-weight:600}
.stars{color:gold}

</style>
</head>
<body>

<div class="nav">
<div class="logo">NYC Store</div>
<div class="cart" onclick="openCart()">🛒<span id="cartCount">0</span></div>
</div>

<div class="hero" id="home">
<h1>اشتراكات رقمية فاخرة</h1>
<div class="categories">
<div class="cat" onclick="showSection('subs')">الحسابات</div>
</div>
</div>

<div class="products" id="subs">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png">
<div class="card-content">OSN<div class="price">15 ريال</div>
<button class="btn" onclick="openDetails('osn')">التفاصيل</button></div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="card-content">Netflix<div class="price">14 ريال</div>
<button class="btn" onclick="openDetails('netflix')">التفاصيل</button></div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<div class="card-content">Prime<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('prime')">التفاصيل</button></div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Shahid_logo.svg">
<div class="card-content">Shahid<div class="price">24 ريال</div>
<button class="btn" onclick="openDetails('shahid')">التفاصيل</button></div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
<div class="card-content">YouTube<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('youtube')">التفاصيل</button></div>
</div>
</div>

<div class="product-details" id="details">
<div class="product-box" id="detailsContent"></div>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
</div>

<div class="cart-page" id="cartPage">
<h2>السلة</h2>
<div id="cartItems"></div>
<button class="btn">شراء</button>
</div>

<div class="review-container">
<div class="review">
<img src="https://i.pravatar.cc/40">
<div class="name">محمد</div>
<div class="stars">★★★★★</div>
<p>ما قصروا</p>
</div>
</div>

<script>
let cart=[];
let current="";

const data={
osn:`اشتراك OSN\nحساب شهري 15 ريال\nملف خاص 6 ريال\n\nالمميزات\nباقة بريميوم\nضمان 28 يوم\n4K\nيدعم كل الاجهزة\nتسجيل دخول بجهاز واحد`,
netflix:`اشتراك نتفلكس\nحساب شهر 14 ريال\nملف خاص 6 ريال\n\nمميزات\nاعلى جودة\nيدعم الهاتف والكمبيوتر\nضمان 25 يوم`,
prime:`اشتراك برايم\nحساب شهر 12 ريال\nملف خاص 6 ريال\n\nمميزات\nيدعم جميع الاجهزة\nضمان كامل`,
shahid:`شاهد شامل\nحساب شهر 24 ريال\nملف خاص 1 دينار\n\nمميزات\nFULL HD\nبدون اعلانات`,
youtube:`يوتيوب\n12 ريال\n\nمميزات\nبدون اعلانات\nتشغيل بالخلفية`
};

function showSection(id){
 document.getElementById('subs').style.display='grid';
}

function openDetails(type){
 document.getElementById('subs').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('detailsContent').innerText=data[type];
 current=type;
}

function addToCart(){
 cart.push(current);
 document.getElementById('cartCount').innerText=cart.length;
}

function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('cartPage').style.display='block';
 let html='';
 cart.forEach(i=>{html+=`<div class="cart-item">${i}</div>`});
 document.getElementById('cartItems').innerHTML=html;
}
</script>

</body>
</html>
