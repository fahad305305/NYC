<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Cairo',sans-serif;
 color:#e5e7eb;
 text-align:center;
 background:url("https://cdn.discordapp.com/attachments/1481554508797575282/1484414502123343902/NYC0320_21.png?ex=69beccfc&is=69bd7b7c&hm=e6abe566b888e7defa8014e5af9670d026ab78b8b8a262fdd271a403b02907b5&") center/cover no-repeat fixed;
}

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.7);
 z-index:-1;
}

h1{margin-top:30px;color:#3b82f6}

.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:#2a2a2a;
 padding:12px;
 border-radius:50%;
 cursor:pointer
}

.cart span{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:2px 6px;
 border-radius:50%
}

.categories{
 display:flex;
 gap:15px;
 justify-content:center;
 margin-top:20px
}

.cat{
 background:#2a2a2a;
 padding:12px 20px;
 border-radius:10px;
 cursor:pointer;
 transition:.3s
}

.cat:hover{
 background:#3b82f6;
 transform:scale(1.08)
}

.products{
 display:none;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 max-width:900px;
 margin:40px auto
}

.card{
 background:#2a2a2a;
 border-radius:12px;
 overflow:hidden
}

.card img{
 width:100%;
 aspect-ratio:1220/686;
 object-fit:cover
}

.card-content{
 padding:10px
}

.price{
 color:#60a5fa
}

.btn{
 background:linear-gradient(135deg,#3b82f6,#2563eb);
 color:#fff;
 border:none;
 padding:10px 22px;
 border-radius:14px;
 cursor:pointer;
 margin-top:10px;
 font-weight:700;
 transition:.3s
}

.btn:hover{
 transform:scale(1.08)
}

.details{
 display:none;
 margin-top:40px
}

.box{
 background:#2a2a2a;
 padding:20px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
 text-align:right
}

.box img{
 width:100%;
 border-radius:10px;
 margin-bottom:10px
}

.cart-page{
 display:none;
 margin-top:40px
}

.item{
 background:#2a2a2a;
 margin:10px auto;
 padding:10px;
 border-radius:10px;
 max-width:320px;
 display:flex;
 justify-content:space-between
}

.total{
 color:#3b82f6;
 margin-top:10px
}

.buy-btn{
 background:#22c55e;
 padding:12px 24px;
 border-radius:14px;
 color:#fff;
 border:none;
 margin-top:12px;
 cursor:pointer
}

.review-container{
 position:fixed;
 bottom:20px;
 left:20px
}

.review{
 background:#2a2a2a;
 padding:10px;
 border-radius:12px;
 width:200px
}

.stars{
 color:gold
}

.tiktok{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#2a2a2a;
 padding:10px;
 border-radius:10px
}
</style>
</head>

<body>

<h1>NYC Store</h1>

<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>

<div class="categories">
<div class="cat" onclick="show()">اشتراكات</div>
</div>

<div class="products" id="subs">

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414710886568057/NYC0320_18.png?ex=69becd2e&is=69bd7bae&hm=0dc82450c2a74282193f414412d039b07b97d9f693942b25325e7cdf1426eabc&">
<div class="card-content">
Netflix
<div class="price">14 ريال</div>
<button class="btn" onclick="openDetails('netflix',14)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414605236371517/NYC0320_9.png?ex=69becd14&is=69bd7b94&hm=168d40475c110b2b73eba123917093a1dc3a1a67d16479520d4025359625c4d7&">
<div class="card-content">
OSN
<div class="price">15 ريال</div>
<button class="btn" onclick="openDetails('osn',15)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414688161693736/NYC0320_17.png?ex=69becd28&is=69bd7ba8&hm=667d2c4c2a283f4805741eceffc8202a2cc38f9ac4a1d5d6782813e7a4b7b6ae&">
<div class="card-content">
Prime
<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('prime',12)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414652019380344/NYC0320_10.png?ex=69becd20&is=69bd7ba0&hm=b1ec22b243d4b6e5acf3826c48f1da44203122a8b29ffb388029740aa75cceb4&">
<div class="card-content">
Shahid
<div class="price">24 ريال</div>
<button class="btn" onclick="openDetails('shahid',24)">التفاصيل</button>
</div>
</div>

<div class="card">
<img src="https://cdn.discordapp.com/attachments/1481554508797575282/1484414749549793401/NYC0320_4.png?ex=69becd37&is=69bd7bb7&hm=16cee09ddb121bdc927e4d77a1c64e45420f01ec496cca325ca1ebde0c817233&">
<div class="card-content">
YouTube
<div class="price">12 ريال</div>
<button class="btn" onclick="openDetails('youtube',12)">التفاصيل</button>
</div>
</div>

</div>

<div class="details" id="details">
<div class="box">
<img id="img">
<h3 id="name"></h3>
<p id="desc"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
<button class="btn" onclick="back()">رجوع</button>
</div>
</div>

<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="buy-btn" onclick="goBuy()">شراء</button>
<button class="btn" onclick="backHome()">رجوع</button>
</div>

<div id="successBar" style="position:fixed;top:-80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);border:2px solid #22c55e;color:#22c55e;padding:12px 25px;border-radius:12px;z-index:2000;transition:.4s;">
تمت الإضافة إلى السلة
</div>

<script>
let cart=[];
let current={};

const detailsImages={
 netflix:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414736077422772/NYC0320_19.png",
 osn:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414637956005968/NYC0320_2.png",
 prime:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414700686151831/NYC0320_8.png",
 shahid:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414669648167062/NYC0320_1.png",
 youtube:"https://cdn.discordapp.com/attachments/1481554508797575282/1484414759510999172/NYC0320_6.png"
};

const detailsData={
 netflix:"حساب شهر 14 ريال\nملف شخصي 6 ريال",
 osn:"حساب شهري 15 ريال\nملف شخصي 6 ريال",
 prime:"حساب شهر 12 ريال\nملف شخصي 6 ريال",
 shahid:"حساب شهر 24 ريال\nملف شخصي 12 ريال",
 youtube:"دعوة شهر 12 ريال"
};

function show(){
 document.getElementById('subs').style.display='grid';
}

function openDetails(name,price){
 document.getElementById('subs').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=name;
 document.getElementById('desc').innerText=detailsData[name];
 document.getElementById('img').src=detailsImages[name];
 current={name,price};
}

function addToCart(){
 cart.push(current);
 document.getElementById('count').innerText=cart.length;
 showSuccessBar();
}

function showSuccessBar(){
 let bar=document.getElementById('successBar');
 bar.style.top='20px';
 setTimeout(()=>{bar.style.top='-80px'},1500);
}

function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('cart').style.display='block';

 let html='';let total=0;
 cart.forEach((item,i)=>{
 total+=item.price;
 html+=`<div class="item">${item.name} - ${item.price} ريال</div>`;
 });

 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' ريال';
}

function back(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='grid';
}

function backHome(){
 document.getElementById('cart').style.display='none';
 document.getElementById('subs').style.display='grid';
}

function goBuy(){
 window.open('https://youtu.be/EUtyJM4vvcY?si=JYE7fTc7nyqfyTvR','_blank');
}
</script>

</body>
</html>
