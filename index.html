<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
 margin:0;
 font-family:'Cairo',sans-serif;
 background:#1f1f1f;
 color:#e5e7eb;
 text-align:center
}

h1{
 margin-top:30px;
 color:#3b82f6
}

/* CART */
.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:#2a2a2a;
 padding:12px;
 border-radius:50%;
 cursor:pointer
}

.cart span{
 position:absolute;
 top:-5px;
 right:-5px;
 background:red;
 color:#fff;
 font-size:12px;
 padding:2px 6px;
 border-radius:50%
}

/* CATEGORIES */
.categories{
 display:flex;
 gap:15px;
 justify-content:center;
 margin-top:20px
}

.cat{
 background:#2a2a2a;
 padding:12px 20px;
 border-radius:10px;
 cursor:pointer;
 transition:.3s
}

.cat:hover{
 background:#3b82f6;
 transform:scale(1.08)
}

/* PRODUCTS */
.products{
 display:none;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 max-width:650px;
 margin:40px auto
}

.card{
 background:#2a2a2a;
 border-radius:12px;
 overflow:hidden
}

.card img{
 width:100%;
 height:150px;
 object-fit:cover
}

.card-content{
 padding:10px
}

.price{
 color:#60a5fa
}

/* BUTTON */
.btn{
 background:linear-gradient(135deg,#3b82f6,#2563eb);
 color:#fff;
 border:none;
 padding:10px 20px;
 border-radius:12px;
 cursor:pointer;
 margin-top:10px;
 font-weight:600;
 letter-spacing:.5px;
 transition:.3s;
 box-shadow:0 0 10px rgba(59,130,246,.4)
}

.btn:hover{
 transform:scale(1.07);
 box-shadow:0 0 20px rgba(59,130,246,.7)
}

/* DETAILS */
.details{
 display:none;
 margin-top:40px
}

.box{
 background:#2a2a2a;
 padding:20px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
 text-align:right
}

.box img{
 width:100%;
 border-radius:10px;
 margin-bottom:10px
}

/* CART PAGE */
.cart-page{
 display:none;
 margin-top:40px
}

.item{
 background:#2a2a2a;
 margin:10px auto;
 padding:10px;
 border-radius:10px;
 max-width:320px;
 display:flex;
 justify-content:space-between
}

.total{
 color:#3b82f6;
 margin-top:10px
}

.buy-btn{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 padding:12px 24px;
 border-radius:14px;
 color:#fff;
 border:none;
 margin-top:12px;
 font-weight:700;
 letter-spacing:.5px;
 cursor:pointer;
 transition:.3s;
 box-shadow:0 0 12px rgba(34,197,94,.5)
}

.buy-btn:hover{
 transform:scale(1.08);
 box-shadow:0 0 22px rgba(34,197,94,.8)
}

/* REVIEW */
.review-container{
 position:fixed;
 bottom:20px;
 left:20px
}

.review{
 background:#2a2a2a;
 padding:10px;
 border-radius:12px;
 width:200px
}

.stars{
 color:gold
}

/* TIKTOK */
.tiktok{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#2a2a2a;
 padding:10px;
 border-radius:10px
}

</style>
</head>

<body>

<h1>NYC Store</h1>

<div class="cart" onclick="openCart()">
🛒
<span id="count">0</span>
</div>

<div class="categories">
 <div class="cat" onclick="show('subs')">اشتراك حساب</div>
 <div class="cat" onclick="show('profiles')">اشتراك ملف</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="subs">

 <div class="card">
  <img src="https://picsum.photos/400/200?1">
  <div class="card-content">
   Netflix
   <div class="price">14 ريال</div>
   <button class="btn" onclick="openDetails('netflix',14,this.parentElement.parentElement.querySelector('img').src)">
    التفاصيل
   </button>
  </div>
 </div>

 <!-- باقي المنتجات نفس النمط -->

</div>

<div class="products" id="profiles">
 <div class="card">
  <img src="https://picsum.photos/400/200?6">
  <div class="card-content">
   Netflix Profile
   <div class="price">6 ريال</div>
   <button class="btn" onclick="openDetails('netflix',6,this.parentElement.parentElement.querySelector('img').src)">
    التفاصيل
   </button>
  </div>
 </div>
</div>

<!-- DETAILS -->
<div class="details" id="details">
 <div class="box">
  <img id="img">
  <h3 id="name"></h3>
  <p id="desc"></p>
  <button class="btn" onclick="addToCart()">إضافة للسلة</button>
  <button class="btn" onclick="back()">رجوع</button>
 </div>
</div>

<!-- CART -->
<div class="cart-page" id="cart">
 <h2>السلة</h2>
 <div id="items"></div>
 <div class="total" id="total"></div>

 <button class="buy-btn" onclick="goBuy()">شراء</button>
 <button class="btn" onclick="backHome()">رجوع</button>
</div>

<!-- REVIEW -->
<div class="review-container">
 <div class="review">
  <div>محمد</div>
  <div class="stars">★★★★★</div>
  <p>ما قصروا</p>
 </div>
</div>

<!-- TIKTOK -->
<div class="tiktok">
 <a href="https://www.tiktok.com/@f.0aha" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" width="30">
 </a>
</div>

<script>

// نفس الكود بدون تعديل

</script>

</body>
</html>
