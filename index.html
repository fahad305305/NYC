<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#050505;color:#fff}
.nav{display:flex;justify-content:space-between;padding:20px 40px;position:fixed;width:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(10px)}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:60px}
.hero span{background:linear-gradient(90deg,#6a5cff,#00c6ff);-webkit-background-clip:text;color:transparent}
.section{padding:80px 20px;text-align:center}
.categories{display:flex;gap:20px;justify-content:center;margin-top:30px}
.cat{background:#111;padding:40px;border-radius:15px;cursor:pointer;font-size:20px}
.products{display:none;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;padding:20px;border-radius:15px;cursor:pointer}
.review-box{width:300px;margin:auto}
.star{color:gold;font-size:18px}
.cart{position:fixed;bottom:20px;right:20px;background:#111;padding:15px;border-radius:10px}
.hidden{display:none}
</style>
</head>
<body>

<div class="nav">
<h2>NYC</h2>
<div id="cart">🛒 0</div>
</div>

<div class="hero">
<h1>اشتراكات رقمية<br><span>بمستوى فاخر</span></h1>
<p>جودة عالية - تسليم فوري</p>

<div class="categories">
<div class="cat" onclick="showProducts('subs')">الحسابات الشهرية</div>
<div class="cat" onclick="showProducts('profiles')">الملفات الشخصية</div>
</div>
</div>

<div class="section">
<h2>من نحن</h2>
<p>متجر يوفر اشتراكات رقمية بسرعة وجودة عالية وتجربة فاخرة.</p>
</div>

<div class="section products" id="subs">
<h2>الباقات</h2>
<div class="card" onclick="openProduct('Netflix','4K + جميع الدول','3 KD')">Netflix</div>
<div class="card" onclick="openProduct('Prime','أفلام ومسلسلات','2 KD')">Prime</div>
<div class="card" onclick="openProduct('Shahid','محتوى عربي','2.5 KD')">Shahid</div>
<div class="card" onclick="openProduct('OSN','أحدث العروض','3 KD')">OSN</div>
</div>

<div class="section hidden" id="productPage">
<h2 id="pname"></h2>
<p id="pdesc"></p>
<p id="pprice"></p>
<button onclick="addToCart()">إضافة للسلة</button>
</div>

<div class="section">
<h2>تقييم العملاء</h2>
<div class="review-box" id="review"></div>
</div>

<script>
let cart=0;
let currentProduct={};

function showProducts(type){
 document.getElementById('subs').style.display='grid';
}

function openProduct(name,desc,price){
 document.getElementById('productPage').classList.remove('hidden');
 document.getElementById('pname').innerText=name;
 document.getElementById('pdesc').innerText=desc;
 document.getElementById('pprice').innerText=price;
 currentProduct={name};
 window.scrollTo(0,document.body.scrollHeight);
}

function addToCart(){
 cart++;
 document.getElementById('cart').innerText='🛒 '+cart;
}

const reviews=[
'ما قصروا ⭐⭐⭐⭐⭐',
'تسليم سريع ⭐⭐⭐⭐⭐',
'خدمة ممتازة ⭐⭐⭐⭐⭐',
'تعامل راقي ⭐⭐⭐⭐⭐'
];

let i=0;
setInterval(()=>{
 document.getElementById('review').innerText=reviews[i];
 i=(i+1)%reviews.length;
},2000);
</script>

</body>
</html>
