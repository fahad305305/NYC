<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(180deg,#0a0a0a,#1f1f1f);color:#60a5fa;overflow-x:hidden}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;position:fixed;width:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:1000}
.logo{font-weight:700;font-size:20px}

/* CART */
.cart{position:fixed;top:20px;right:30px;background:#2a2a2a;padding:12px;border-radius:50%;cursor:pointer;transition:.3s}
.cart:hover{transform:scale(1.1)}
.cart span{position:absolute;top:-5px;right:-5px;background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:50%}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:55px;margin:0}
.hero span{color:#3b82f6}
.hero p{color:#aaa;margin-top:10px}

/* GLOW BACKGROUND */
.glow{position:absolute;width:400px;height:400px;background:#3b82f6;filter:blur(150px);opacity:.2;top:20%;left:30%}

/* CATEGORIES */
.categories{display:flex;gap:20px;margin-top:30px}
.cat{background:#2a2a2a;padding:18px 30px;border-radius:12px;cursor:pointer;transition:.3s}
.cat:hover{transform:scale(1.08);background:#3a3a3a}

/* PRODUCTS */
.products{display:none;grid-template-columns:repeat(2,1fr);gap:20px;max-width:650px;margin:120px auto}
.card{background:#2a2a2a;border-radius:15px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-6px) scale(1.03)}
.card img{width:100%;height:150px;object-fit:cover}
.card-content{padding:12px;text-align:center}
.price{color:#fff;margin-top:5px}
.btn{background:#3b82f6;color:#fff;border:none;padding:8px;border-radius:8px;cursor:pointer;width:100%;margin-top:8px}

/* DETAILS */
.details{display:none;text-align:center;margin-top:120px;animation:fade .6s}
.details-box{background:#2a2a2a;padding:25px;border-radius:15px;max-width:320px;margin:auto}

/* CART PAGE */
.cart-page{display:none;text-align:center;margin-top:120px}
.cart-item{background:#2a2a2a;margin:10px auto;padding:10px;border-radius:10px;max-width:300px;display:flex;justify-content:space-between}
.total{margin-top:10px;font-weight:bold}

/* REVIEW */
.review-container{position:fixed;bottom:20px;left:20px;width:220px;overflow:hidden}
.review-track{display:flex;gap:10px;animation:slide 10s linear infinite}
.review{min-width:220px;background:#2a2a2a;padding:10px;border-radius:12px;text-align:center}
@keyframes slide{0%{transform:translateX(0)}100%{transform:translateX(-230px)}}

/* ANIMATIONS */
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.added{animation:pop .4s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

</style>
</head>
<body>

<div class="nav"><div class="logo">NYC</div></div>
<div class="cart" onclick="openCart()">🛒<span id="count">0</span></div>
<div class="glow"></div>

<!-- HOME -->
<div class="hero" id="home">
<h1>اشتراكات رقمية <br><span>فخمة</span></h1>
<p>تجربة احترافية + تسليم سريع</p>
<div class="categories">
<div class="cat" onclick="show('subs')">الحسابات</div>
<div class="cat" onclick="show('profiles')">الملفات</div>
</div>
</div>

<!-- PRODUCTS -->
<div class="products" id="subs">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"><div class="card-content">Netflix<div class="price">3 KD</div><button class="btn" onclick="openDetails('Netflix','اشتراك كامل 4K','3')">التفاصيل</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png"><div class="card-content">OSN<div class="price">3 KD</div><button class="btn" onclick="openDetails('OSN','اشتراك كامل','3')">التفاصيل</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png"><div class="card-content">Prime<div class="price">2 KD</div><button class="btn" onclick="openDetails('Prime','اشتراك','2')">التفاصيل</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Shahid_logo.svg"><div class="card-content">Shahid<div class="price">2.5 KD</div><button class="btn" onclick="openDetails('Shahid','اشتراك','2.5')">التفاصيل</button></div></div>
</div>

<div class="products" id="profiles">
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png"><div class="card-content">Prime Profile<div class="price">1 KD</div><button class="btn" onclick="openDetails('Prime Profile','ملف واحد','1')">التفاصيل</button></div></div>
<div class="card"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/OSN_logo.png"><div class="card-content">OSN Profile<div class="price">1 KD</div><button class="btn" onclick="openDetails('OSN Profile','ملف واحد','1')">التفاصيل</button></div></div>
</div>

<!-- DETAILS -->
<div class="details" id="details">
<div class="details-box">
<h2 id="name"></h2>
<p id="desc"></p>
<p id="price"></p>
<button class="btn" onclick="addToCart()">إضافة للسلة</button>
</div>
</div>

<!-- CART -->
<div class="cart-page" id="cart">
<h2>السلة</h2>
<div id="items"></div>
<div class="total" id="total"></div>
<button class="btn">شراء</button>
</div>

<!-- REVIEW -->
<div class="review-container">
<div class="review-track">
<div class="review">ما قصروا ⭐⭐⭐⭐⭐</div>
<div class="review">سريع ⭐⭐⭐⭐⭐</div>
<div class="review">ممتاز ⭐⭐⭐⭐⭐</div>
</div>
</div>

<script>
let cart=[];let current={};

function show(id){
 document.getElementById('home').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='none';
 document.getElementById(id).style.display='grid';
}

function openDetails(n,d,p){
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('details').style.display='block';
 document.getElementById('name').innerText=n;
 document.getElementById('desc').innerText=d;
 document.getElementById('price').innerText=p+' KD';
 current={name:n,price:parseFloat(p)};
}

function addToCart(){
 cart.push(current);
 let c=document.getElementById('count');
 c.innerText=cart.length;
 c.classList.add('added');
 setTimeout(()=>c.classList.remove('added'),300);
}

function openCart(){
 document.getElementById('details').style.display='none';
 document.getElementById('subs').style.display='none';
 document.getElementById('profiles').style.display='none';
 document.getElementById('cart').style.display='block';
 let html='';let total=0;
 cart.forEach((i,index)=>{
 total+=i.price;
 html+=`<div class="cart-item">${i.name} - ${i.price} KD <button onclick="remove(${index})">❌</button></div>`;
 });
 document.getElementById('items').innerHTML=html;
 document.getElementById('total').innerText='المجموع: '+total+' KD';
}

function remove(i){
 cart.splice(i,1);
 document.getElementById('count').innerText=cart.length;
 openCart();
}
</script>

</body>
</html>
